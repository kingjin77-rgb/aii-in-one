<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영업통합프로그램 | All-in-One</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1c2438;
    --border: #2a3550;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --green: #22c55e;
    --yellow: #eab308;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .header h1 {
    font-size: clamp(24px, 4vw, 38px);
    font-weight: 800;
    background: linear-gradient(135deg, #e2e8f0, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }
  .header p {
    color: var(--text2);
    font-size: 15px;
  }

  /* ── Stats Bar ── */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 48px;
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text2);
    margin-top: 4px;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto 48px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
    box-shadow: 0 8px 32px rgba(59,130,246,0.15);
  }
  .card:hover::before { opacity: 1; }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .card-icon {
    width: 52px; height: 52px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .card-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
  }

  /* ── Status Badge ── */
  .card-status {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text2);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .dot-gray { background: #475569; }

  .card-stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text2);
    margin-left: auto;
  }
  .card-stats span b {
    color: var(--text);
    font-weight: 600;
  }

  /* ── Buttons ── */
  .card-actions { display: flex; gap: 8px; }
  .btn-launch {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-launch:hover { opacity: 0.9; }
  .btn-launch:active { transform: scale(0.98); }
  .btn-launch.disabled {
    background: var(--surface2);
    color: var(--text2);
    cursor: not-allowed;
  }
  .btn-gh {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-gh:hover { border-color: var(--accent); color: var(--text); }

  /* ── Footer ── */
  .footer {
    text-align: center;
    color: var(--text2);
    font-size: 12px;
    max-width: 1100px;
    margin: 0 auto;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }
  .footer a { color: var(--accent); text-decoration: none; }

  /* ── Add Program Card ── */
  .card-add {
    border-style: dashed;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 200px;
    color: var(--text2);
    cursor: default;
  }
  .card-add .add-icon {
    font-size: 32px;
    margin-bottom: 12px;
    opacity: 0.5;
  }
  .card-add p { font-size: 13px; opacity: 0.6; margin-top: 6px; }

  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
    .stats-bar { gap: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">⚖️ Law Firm Sales Suite</div>
  <h1>영업통합프로그램</h1>
  <p>법무법인 영업 도구 올인원 대시보드</p>
</div>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-value" id="totalPrograms">6</div>
    <div class="stat-label">등록 프로그램</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="todayUsed">0</div>
    <div class="stat-label">오늘 사용</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="totalLaunches">0</div>
    <div class="stat-label">총 실행 횟수</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="activeToday">-</div>
    <div class="stat-label">마지막 활동</div>
  </div>
</div>

<div class="grid" id="programGrid"></div>

<div class="footer">
  <p>
    프로그램 추가: <a href="https://github.com/kingjin77-rgb/aii-in-one" target="_blank">github.com/kingjin77-rgb/aii-in-one</a>의 index.html에서 PROGRAMS 배열에 항목 추가
  </p>
</div>

<script>
// ══════════════════════════════════════════════════
//  프로그램 목록 — 새 프로그램 추가 시 여기에만 추가
// ══════════════════════════════════════════════════
const PROGRAMS = [
  {
    id: 'jl-scanner',
    icon: '🔍',
    name: 'JL 스캐너',
    desc: '네이버카페에서 법무법인 선정공고 자동 탐지 · 추출',
    url: 'https://github.com/kingjin77-rgb/jl-scanner',
    urlType: 'github',  // Streamlit Cloud 배포 후 url/urlType 변경
    ghUrl: 'https://github.com/kingjin77-rgb/jl-scanner',
    tag: 'Python · Streamlit',
  },
  {
    id: 'zero-listing',
    icon: '🏠',
    name: '제로리스팅',
    desc: '분양전환 아파트 매물 상담 접수 · 구글시트 연동',
    url: 'https://kingjin77-rgb.github.io/zero-listing',
    urlType: 'live',
    ghUrl: 'https://github.com/kingjin77-rgb/zero-listing',
    tag: 'HTML · Live',
  },
  {
    id: 'card-news',
    icon: '📰',
    name: '카드뉴스 생성기',
    desc: 'Claude AI로 카드뉴스 자동생성 · 4가지 테마 · PNG 다운로드',
    url: 'https://kingjin77-rgb.github.io/card-news-generator',
    urlType: 'live',
    ghUrl: 'https://github.com/kingjin77-rgb/card-news-generator',
    tag: 'HTML · Claude AI',
  },
  {
    id: 'apt-crawler',
    icon: '🏢',
    name: '아파트 크롤러',
    desc: '청약홈·LH·SH 공고 자동수집 · Excel·CSV·SQLite 저장',
    url: 'https://github.com/kingjin77-rgb/apt-crawler',
    urlType: 'github',
    ghUrl: 'https://github.com/kingjin77-rgb/apt-crawler',
    tag: 'Python · CLI',
  },
  {
    id: 'law-chatbot',
    icon: '⚖️',
    name: '법률 챗봇',
    desc: '법령·판례 AI 검색 챗봇 · 국가법령 Open API + Claude',
    url: 'https://kingjin77-rgb.github.io/law-chatbot-web',
    urlType: 'live',
    ghUrl: 'https://github.com/kingjin77-rgb/law-chatbot-web',
    tag: 'HTML · Claude AI',
  },
  {
    id: 'github-ebook',
    icon: '📚',
    name: 'GitHub 이북',
    desc: 'GitHub + GitBook으로 전자책 제작 가이드',
    url: 'https://kingjin77-rgb.github.io/github-ebook',
    urlType: 'live',
    ghUrl: 'https://github.com/kingjin77-rgb/github-ebook',
    tag: 'Markdown · Guide',
  },
  {
    id: 'wijimjang',
    icon: '📋',
    name: '위임장 접수',
    desc: '아파트 위임장 접수 관리 · 대시보드 · 구글시트 연동',
    url: 'https://kingjin77-rgb.github.io/wijimjang-reception',
    urlType: 'live',
    ghUrl: 'https://github.com/kingjin77-rgb/wijimjang-reception',
    tag: 'HTML · Live',
  },
  {
    id: 'landscape-map',
    icon: '🌿',
    name: '조경 배치도',
    desc: '단지 8대 핵심 조경 거점 배치도 · 인터랙티브 맵',
    url: 'https://kingjin77-rgb.github.io/landscape-map',
    urlType: 'live',
    ghUrl: 'https://github.com/kingjin77-rgb/landscape-map',
    tag: 'HTML · Live',
  },
];

// ══════════════════════════════════════════════════
//  localStorage 헬퍼
// ══════════════════════════════════════════════════
const KEY = (id) => `aio_${id}`;
const today = new Date().toISOString().slice(0, 10);

function getStats(id) {
  try {
    return JSON.parse(localStorage.getItem(KEY(id))) || { count: 0, last: null };
  } catch { return { count: 0, last: null }; }
}

function recordLaunch(id) {
  const s = getStats(id);
  s.count += 1;
  s.last = today;
  localStorage.setItem(KEY(id), JSON.stringify(s));
}

function statusInfo(last) {
  if (!last) return { cls: 'dot-gray', text: '미사용' };
  const diff = Math.floor((Date.now() - new Date(last)) / 86400000);
  if (diff === 0) return { cls: 'dot-green', text: '오늘 사용' };
  if (diff <= 7)  return { cls: 'dot-yellow', text: `${diff}일 전` };
  return { cls: 'dot-gray', text: `${last}` };
}

// ══════════════════════════════════════════════════
//  카드 렌더링
// ══════════════════════════════════════════════════
function renderCard(p) {
  const s = getStats(p.id);
  const si = statusInfo(s.last);
  const isLive = p.urlType === 'live';
  const isNone = p.urlType === 'none';

  const launchLabel = isLive ? '▶ 실행' : isNone ? '준비중' : '저장소 열기';
  const launchCls = isNone ? 'btn-launch disabled' : 'btn-launch';

  return `
  <div class="card" id="card-${p.id}">
    <div class="card-top">
      <div class="card-icon">${p.icon}</div>
      <div class="card-meta">
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
      </div>
    </div>

    <div class="card-status">
      <span class="status-dot ${si.cls}"></span>
      <span>${si.text}</span>
      <span style="margin-left:auto;font-size:11px;background:#0a0e1a;padding:2px 8px;border-radius:4px;color:#64748b">${p.tag}</span>
    </div>

    <div style="display:flex;gap:16px;font-size:12px;color:#64748b;padding:0 2px">
      <span>실행 <b style="color:#e2e8f0">${s.count}</b>회</span>
      <span>마지막 <b style="color:#e2e8f0">${s.last || '—'}</b></span>
    </div>

    <div class="card-actions">
      ${isNone
        ? `<span class="${launchCls}" style="cursor:not-allowed">${launchLabel}</span>`
        : `<a href="${p.url}" target="_blank" class="${launchCls}" onclick="launch('${p.id}')">${launchLabel}</a>`
      }
      ${p.ghUrl
        ? `<a href="${p.ghUrl}" target="_blank" class="btn-gh" title="GitHub">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
            </svg>
          </a>`
        : ''
      }
    </div>
  </div>`;
}

function launch(id) {
  recordLaunch(id);
  setTimeout(updateSummary, 100);
  setTimeout(() => renderCards(), 200);
}

function renderCards() {
  const grid = document.getElementById('programGrid');
  grid.innerHTML = PROGRAMS.map(renderCard).join('') +
    `<div class="card card-add">
      <div class="add-icon">＋</div>
      <div style="font-weight:600;color:#64748b">새 프로그램 추가</div>
      <p>index.html의 PROGRAMS 배열에<br>항목을 추가하세요</p>
    </div>`;
}

// ══════════════════════════════════════════════════
//  요약 통계
// ══════════════════════════════════════════════════
function updateSummary() {
  let totalLaunches = 0, todayUsed = 0, lastDate = null;
  PROGRAMS.forEach(p => {
    const s = getStats(p.id);
    totalLaunches += s.count;
    if (s.last === today) todayUsed++;
    if (s.last && (!lastDate || s.last > lastDate)) lastDate = s.last;
  });
  document.getElementById('totalLaunches').textContent = totalLaunches;
  document.getElementById('todayUsed').textContent = todayUsed;
  document.getElementById('activeToday').textContent = lastDate || '—';
}

// ══════════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════════
renderCards();
updateSummary();
</script>
</body>
</html>
