<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:740px;height:400px;overflow:hidden;font-family:'맑은 고딕','Malgun Gothic',sans-serif;}
.hero{width:740px;height:400px;background:linear-gradient(135deg,#0a3d6b 0%,#0369a1 30%,#047857 70%,#059669 100%);position:relative;overflow:hidden;display:flex;align-items:center;padding:0 48px;}
.circle1{position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(255,255,255,0.04);top:-150px;right:-80px;}
.circle2{position:absolute;width:250px;height:250px;border-radius:50%;background:rgba(255,255,255,0.03);bottom:-80px;left:40px;}
.circle3{position:absolute;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.05);top:60px;right:180px;}
.left{flex:1;position:relative;z-index:1;}
.right{width:220px;text-align:center;position:relative;z-index:1;}
.tag{display:inline-block;background:#fbbf24;color:#0a3d6b;font-size:11px;font-weight:bold;padding:4px 14px;border-radius:3px;letter-spacing:1px;}
.title{font-size:44px;font-weight:900;color:#fff;margin-top:16px;line-height:1.25;letter-spacing:-1px;}
.subtitle{font-size:15px;color:#d1fae5;margin-top:10px;letter-spacing:0.5px;}
.slogan{margin-top:18px;padding:10px 0;border-top:1px solid rgba(255,255,255,0.15);}
.slogan span{font-size:16px;color:#fbbf24;font-weight:bold;letter-spacing:0.5px;}
.cta{display:inline-block;margin-top:18px;background:#fff;color:#0369a1;font-size:14px;font-weight:bold;padding:12px 32px;border-radius:8px;letter-spacing:0.5px;}
.member-card{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:28px 20px;backdrop-filter:blur(4px);}
.member-label{font-size:12px;color:#bae6fd;letter-spacing:1px;}
.member-num{font-size:52px;font-weight:900;color:#fff;line-height:1.3;}
.member-unit{font-size:13px;color:#d1fae5;}
.badge-row{margin-top:16px;display:flex;gap:8px;justify-content:center;}
.badge{display:inline-block;background:rgba(255,255,255,0.12);color:#bae6fd;font-size:10px;padding:4px 10px;border-radius:12px;}
</style></head>
<body>
<div class="hero">
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="circle3"></div>
  <div class="left">
    <span class="tag">SUBSCRIPTION INFO</span>
    <div class="title">평택 고덕국제신도시<br/>오산 청약 연구소</div>
    <div class="subtitle">아주 정직한 청약 정보 커뮤니티</div>
    <div class="slogan">
      <span>&ldquo;카더라는 없다. 모집공고가 정답이다.&rdquo;</span>
    </div>
    <span class="cta">카페 가입하기 &rarr;</span>
  </div>
  <div class="right">
    <div class="member-card">
      <div class="member-label">현재 멤버</div>
      <div class="member-num">255</div>
      <div class="member-unit">명과 함께</div>
      <div class="badge-row">
        <span class="badge">평택고덕</span>
        <span class="badge">오산</span>
      </div>
    </div>
  </div>
</div>
</body></html>
