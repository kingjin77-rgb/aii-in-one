<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:740px;height:130px;overflow:hidden;font-family:'맑은 고딕','Malgun Gothic',sans-serif;}
.menu{width:740px;height:130px;background:#f8fafc;display:flex;gap:10px;padding:15px 12px;align-items:stretch;}
.card{flex:1;background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 4px;transition:all .2s;}
.icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;color:#fff;margin-bottom:6px;}
.icon-blue{background:#0369a1;}
.icon-green{background:#059669;}
.icon-teal{background:#047857;}
.icon-dark{background:#1e293b;}
.icon-purple{background:#7c3aed;}
.label{font-size:13px;font-weight:bold;color:#1e293b;line-height:1.4;}
.desc{font-size:10px;color:#94a3b8;margin-top:2px;}
</style></head>
<body>
<div class="menu">
  <div class="card">
    <div class="icon icon-blue">N</div>
    <span class="label">공지사항</span>
    <span class="desc">아정청 데스크</span>
  </div>
  <div class="card">
    <div class="icon icon-green">G</div>
    <span class="label">평택고덕</span>
    <span class="desc">청약 단지</span>
  </div>
  <div class="card">
    <div class="icon icon-teal">O</div>
    <span class="label">오산 · 경기</span>
    <span class="desc">청약 단지</span>
  </div>
  <div class="card">
    <div class="icon icon-dark">★</div>
    <span class="label">치트키 연구소</span>
    <span class="desc">실전 전략</span>
  </div>
  <div class="card">
    <div class="icon icon-purple">V</div>
    <span class="label">VIP 당첨자관</span>
    <span class="desc">후기 · 계약</span>
  </div>
</div>
</body></html>
