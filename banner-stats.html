<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:740px;height:90px;overflow:hidden;font-family:'맑은 고딕','Malgun Gothic',sans-serif;}
.stats{width:740px;height:90px;background:#0f172a;display:flex;gap:10px;padding:12px;align-items:stretch;}
.stat{flex:1;background:#1e293b;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;}
.num{font-size:28px;font-weight:900;line-height:1.3;}
.num-gold{color:#fbbf24;}
.num-blue{color:#38bdf8;}
.num-green{color:#34d399;}
.txt{font-size:11px;color:#94a3b8;margin-top:2px;}
</style></head>
<body>
<div class="stats">
  <div class="stat">
    <span class="num num-gold">100%</span>
    <span class="txt">모집공고 기반 팩트</span>
  </div>
  <div class="stat">
    <span class="num num-blue">255+</span>
    <span class="txt">멤버와 함께</span>
  </div>
  <div class="stat">
    <span class="num num-green">5</span>
    <span class="txt">전문 게시판 운영</span>
  </div>
</div>
</body></html>
